name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev \
            curl unzip \
            libffi-dev libssl-dev \
            ant autoconf automake libtool pkg-config
          
          # ★ ビルド環境に kivmob をインストール
          pip install --user kivmob
          pip install --user --upgrade "Cython<3.0" buildozer

      - name: Build with Buildozer
        run: |
          if [ -f buildozer.spec.txt ]; then mv buildozer.spec.txt buildozer.spec; fi
          export PATH=$PATH:~/.local/bin
          export JAVA_HOME=$JAVA_HOME_17_X64
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
