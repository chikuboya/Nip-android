name: Android Build
on: [push, pull_request]

jobs:
  build:
    # OSを実績のある22.04に変更（24.04でのマクロエラー回避）
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Java 17をセットアップ
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev \
            curl unzip \
            libffi-dev libssl-dev \
            ant autoconf automake libtool pkg-config
          # Cythonのバージョンを安定版に固定
          pip install --user --upgrade "Cython<3.0" buildozer

      - name: Build with Buildozer
      run: |
        # ツールを最新の安定版にアップデート
        pip install --user --upgrade buildozer Cython==0.29.33 python-for-android
        
        # パスの設定
        export PATH=$PATH:~/.local/bin
        
        # もしファイル名が間違っていたら修正
        if [ -f buildozer.spec.txt ]; then mv buildozer.spec.txt buildozer.spec; fi
        
        # Java環境変数を適用（JDK 17を使用）
        export JAVA_HOME=$JAVA_HOME_17_X64
        
        # ビルド実行（詳細ログを有効化）
        yes | buildozer -v android debug
      env:
        ACCEPT_SDK_LICENSE: "yes"
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
