name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev \
            curl unzip \
            libffi-dev libssl-dev \
            ant autoconf automake libtool pkg-config

      - name: Build with Buildozer
        run: |
          # 1. 既存の古いツールをクリーンアップ
          pip uninstall -y buildozer python-for-android
          pip install --user buildozer Cython==0.29.33 python-for-android
          
          export PATH=$PATH:~/.local/bin
          
          # 2. Android SDKライセンスへの強制同意設定
          # これが今回のエラーに対する直接の解決策です
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # 3. ファイル名の修正（もしあれば）
          if [ -f buildozer.spec.txt ]; then mv buildozer.spec.txt buildozer.spec; fi
          
          # 4. Java 17を指定
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          # 5. ビルド実行
          # --auto-accept-sdk-license オプションを明示的に指定して実行します
          buildozer -v android debug
        env:
          # 環境変数でもライセンス承諾を通知
          ACCEPT_SDK_LICENSE: "yes"
          # Android SDKのパスを固定（エラー回避用）
          ANDROID_SDK_HOME: /home/runner/.android
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
