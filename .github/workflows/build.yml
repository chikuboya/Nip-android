name: Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04  # ★ 安定している22.04にあえて下げます
    steps:
      - uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ steps.get-date.outputs.date }}

      - name: Build with Buildozer
        uses: ArtemSashko/buildozer-action@v1.6.1
        with:
          buildozer_version: stable
          python_version: 3.11
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
