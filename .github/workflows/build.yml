name: Android Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev \
            curl unzip \
            libffi-dev libssl-dev \
            ant autoconf automake libtool pkg-config

      - name: Build with Buildozer
        run: |
          # 1. 既存の古いBuildozerを完全に削除してクリーンにする
          pip uninstall -y buildozer python-for-android
          
          # 2. 最新版をインストール
          pip install --user buildozer Cython==0.29.33 python-for-android
          
          # パスの設定
          export PATH=$PATH:~/.local/bin
          
          # ファイル名の修正（もしあれば）
          if [ -f buildozer.spec.txt ]; then mv buildozer.spec.txt buildozer.spec; fi
          
          # Java 17を指定
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          # 3. ビルド実行
          # --profile を指定せず、直接実行して衝突を避ける
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
